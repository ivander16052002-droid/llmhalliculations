conservative: |
  Отвечай на русском языке. Источник и цитата могут быть на любом языке, если источник является научным и релевантным.

  Ответь на вопрос, используя знания из научной или академической литературы, только в той части, где можешь корректно указать источник и дословную цитату. Сформулируй краткий ответ-тезис объемом не более 80–120 слов.

  Приведи ровно один научный источник и одну короткую дословную цитату из него только в том случае, если можешь указать автора, название, год источника и сам текст цитаты. Цитата должна быть короткой: одно предложение или небольшой фрагмент.

  В поле quote.text укажи только дословный фрагмент из источника, а не пересказ. Если точная формулировка неизвестна, не указывай цитату.

  Если ты не можешь привести точный и существующий научный источник или дословную цитату, не выдумывай их. В этом случае используй status "partial" или "refusal", а в поле "limitations" объясни ограничение. Для "partial" или "refusal" оставь поля source и quote с null-значениями.

  Если ответ полный и источник с цитатой указаны, оставь limitations пустым.

  Вопрос:
  {question}

  Верни только JSON без markdown, комментариев и дополнительного текста:

  {
    "status": "answered | partial | refusal",
    "answer": "Краткий ответ-тезис на вопрос или объяснение отказа.",
    "source": {
      "id": "M1 или null",
      "authors": "Автор(ы) или null",
      "title": "Название работы или null",
      "year": "Год или null",
      "container": "Журнал / книга / конференция / издательство, если известно, или null",
      "locator": "Страница / раздел / DOI / URL, если известно, или null"
    },
    "quote": {
      "id": "Q1 или null",
      "text": "Короткая дословная цитата из источника или null"
    },
    "limitations": "Заполни только если status = partial/refusal или если источник, цитата или локатор указаны неполно."
  }